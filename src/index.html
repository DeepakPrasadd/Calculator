<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="output.css" rel="stylesheet" />
    <title>Document</title>
  </head>
  <body class="bg-slate-800 w-full h-screen flex justify-center items-center text-2xl">
    <div
      class="border w-85  h-100 flex justify-center items-center flex-row flex-wrap gap-2 rounded-2xl bg-gray-600 shadow-2xl"
    >
      <input
        type="text"
        name="result"
        id="result"
        value="0"
        readonly
        class="bg-gray-200 text-black w-75 h-20 rounded-2xl outline-0 p-5 gap-2"
      />
      <div class="numbers flex flex-row flex-wrap justify-center gap-2 w-50">
        <button id="one" class="border rounded-xl w-15 bg-gray-100 text-black shadow-2xl">1</button>
        <button id="two" class="border rounded-xl w-15 bg-gray-100 text-black shadow-2xl">2</button>
        <button id="three" class="border rounded-xl w-15 bg-gray-100 text-black shadow-2xl">3</button>
        <button id="four" class="border rounded-xl w-15 bg-gray-100 text-black shadow-2xl">4</button>
        <button id="five" class="border rounded-xl w-15 bg-gray-100 text-black shadow-2xl">5</button>
        <button id="six" class="border rounded-xl w-15 bg-gray-100 text-black shadow-2xl">6</button>
        <button id="seven" class="border rounded-xl w-15 bg-gray-100 text-black shadow-2xl">7</button>
        <button id="eight" class="border rounded-xl w-15 bg-gray-100 text-black shadow-2xl">8</button>
        <button id="nine" class="border rounded-xl w-15 bg-gray-100 text-black shadow-2xl">9</button>
        <button id="zero" class="border rounded-xl w-15 bg-gray-100 text-black shadow-2xl">0</button>
        <button id="doubleZero" class="border rounded-xl w-15 bg-gray-100 text-black shadow-2xl">00</button>
        <button id="point" class="operator border rounded-xl w-15 bg-gray-100 text-black shadow-2xl">.</button>
      </div>

      <div class="operators flex flex-col gap-2">
        <button id="plus" class="border rounded-xl w-15 bg-gray-100 text-black shadow-2xl">+</button>
        <button id="minus" class="border rounded-xl w-15 bg-gray-100 text-black shadow-2xl">-</button>
        <button id="multiply" class="border rounded-xl w-15 bg-gray-100 text-black shadow-2xl">*</button>
        <button id="divide" class="border rounded-xl w-15 bg-gray-100 text-black shadow-2xl">/</button>
      </div>
      <div class="flex flex-row gap-2">
        <button id="equal" class="border rounded-xl w-30 bg-amber-500 text-black">=</button>
        <button id="back" class="border rounded-xl w-15 bg-indigo-400 text-black">←</button>
        <button id="clear" class="border rounded-xl w-15 bg-red-400 text-black">AC</button>
        
      </div>
    </div>
  </body>
  <script type="module" src="script.js"></script>
</html>
