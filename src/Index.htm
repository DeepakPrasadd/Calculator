<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./output.css" rel="stylesheet" />
    <title>Document</title>
  </head>
  <body
    class="bg-black text-white w-full h-screen flex justify-center items-center text-3xl"
  >
    <div
      class="border rounded-2xl w-1/4 h-2/3 flex flex-row flex-wrap justify-center items-center gap-1"
    >
      <input
        type="text"
        name="result"
        id="result"
        readonly
        class="bg-white text-black w-xs h-1/5 rounded-2xl "
      />
      <div class="numbers flex flex-row flex-wrap justify-center gap-2 w-2/3" >
        <button id="one" class="border rounded-xl w-15">1</button>
        <button id="two" class="border rounded-xl w-15">2</button>
        <button id="three" class="border rounded-xl w-15">3</button>
        <button id="four" class="border rounded-xl w-15">4</button>
        <button id="five" class="border rounded-xl w-15">5</button>
        <button id="six" class="border rounded-xl w-15">6</button>
        <button id="seven" class="border rounded-xl w-15">7</button>
        <button id="eight" class="border rounded-xl w-15">8</button>
        <button id="nine" class="border rounded-xl w-15">9</button>
        <button id="zero" class="border rounded-xl w-15">0</button>
      </div>

      
      <div class="operators flex flex-col gap-2 ">
        <button id="plus" class="border rounded-xl w-15">+</button>
        <button id="minus" class="border rounded-xl w-15">-</button>
        <button id="multiply" class="border rounded-xl w-15">*</button>
        <button id="divide" class="border rounded-xl w-15">/</button>
      </div>
      <div class="flex flex-row gap-2 ">
         <button id="equal" class="border rounded-xl w-40 ">=</button>
      <button id="clear" class="border rounded-xl w-40 ">Cl</button>
      </div>
     
    </div>
  </body>
  <script src="Script.js"></script>
</html>
